<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Database Browser | Direction-Aware TDA</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
    <script src="explorer.js" defer></script>
  </head>
  <body data-page="database">
    <header class="site-header">
      <a class="brand" href="index.html">Direction-Aware TDA</a>
      <nav class="site-nav" aria-label="Primary">
        <a href="index.html">Paper</a>
        <a href="applets.html">Applets</a>
        <a href="database.html" aria-current="page">Databases</a>
        <a href="repos.html">Repos</a>
      </nav>
    </header>

    <main class="workspace">
      <section class="page-intro">
        <p class="eyebrow">Database browser</p>
        <h1>Datasets and reported metrics</h1>
        <p>Paper-level inventory for RTP, TD, ATTD, and descriptor performance.</p>
      </section>

      <section class="content-section flush">
        <div id="dataset-grid" class="dataset-grid"></div>
      </section>

      <section class="browser-panel">
        <div class="browser-toolbar">
          <label>
            Dataset
            <select id="table-dataset"></select>
          </label>
          <label>
            Descriptor
            <select id="table-method"></select>
          </label>
          <label>
            Search
            <input id="table-search" type="search" placeholder="RTPxz, ECP, ATTD">
          </label>
        </div>
        <div class="table-wrap">
          <table id="results-table">
            <thead>
              <tr>
                <th>Dataset</th>
                <th>Method</th>
                <th>sigma(k)</th>
                <th>sigma(L)</th>
                <th>Non-dir R2</th>
                <th>Dir R2</th>
                <th>R2 gain</th>
                <th>Non-dir MAE</th>
                <th>Dir MAE</th>
                <th>CNN R2</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>
