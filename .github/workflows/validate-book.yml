name: Validate Paper Explorer

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    paths:
      - "paper-explorer/knowledge-base/**"
      - "paper-explorer/obsidian-vault/**"
      - "paper-explorer/site/**"
      - "paper-explorer/scripts/**"
      - "paper-explorer/requirements-book.txt"
      - "docs/**"
      - "README.md"
      - "PLAN.md"
      - "JOURNAL.md"
      - ".github/workflows/validate-book.yml"
  pull_request:
    paths:
      - "paper-explorer/knowledge-base/**"
      - "paper-explorer/obsidian-vault/**"
      - "paper-explorer/site/**"
      - "paper-explorer/scripts/**"
      - "paper-explorer/requirements-book.txt"
      - "docs/**"
      - "README.md"
      - "PLAN.md"
      - "JOURNAL.md"
      - ".github/workflows/validate-book.yml"
  workflow_dispatch:

jobs:
  validate-export:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install JupyterBook
        run: pip install -r paper-explorer/requirements-book.txt
      - name: Validate export
        run: ./paper-explorer/scripts/prepare-site-export.sh
      - name: Upload static site artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper-explorer-site
          path: paper-explorer/site
